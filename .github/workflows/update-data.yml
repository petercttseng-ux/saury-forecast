name: 自動更新秋刀魚資料 (Auto update saury data)

on:
  schedule:
    - cron: '0 20 * * *'      # 每日 UTC 20:00 = 台灣時間 04:00
  workflow_dispatch: {}        # 允許手動觸發

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy pandas requests beautifulsoup4

      - name: Download latest JMA data
        run: |
          python -c "from data_downloader import JMADataDownloader as D; D().download_all(count=10)"

      - name: Rebuild static assets (docs/data)
        run: python build_static.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "Auto-update JMA data ($(date -u +%Y-%m-%d))"
            git push
          fi
